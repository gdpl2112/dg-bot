top.kloping.ai.mcp:
  servers:
    WebSearch:
      server: https://dashscope.aliyuncs.com
      endpoint: /api/v1/mcps/WebSearch/sse
      token: sk-token # 从阿里百炼控制台获取 免费的 否则无法启用 ai的联网功能
      heartbeat: 25
