    url: jdbc:sqlite:data.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
  ai:
    openai:
      api-key: placeholder

server:
  port: 34740
  servlet:
    session:
      timeout: 680400

super:
  qid: 3474006766 # 超级管理

