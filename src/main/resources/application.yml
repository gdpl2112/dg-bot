      server: ${top.kloping.ai.mcp.servers.WebSearch.server}
      endpoint: /api/v1/mcps/WebParser/sse
      token: ${top.kloping.ai.mcp.servers.WebSearch.token}
      heartbeat: 180


# 状态上报
report:
  point-gid: 943648151
  bid: 291841860
  gid: 1041541077

logging:
  pattern:
    console: "%clr([%thread]){blue} %clr(%-32.32logger{32}){magenta} %clr(%d{yyyy-MM-dd HH:mm:ss}){red} %clr(%-5p): %msg%n"
    file: "[%thread] %-32.32logger{32} %d{yyyy-MM-dd HH:mm:ss} %-5p: %msg%n"
  file:
    name: ./logs/slf4j.log
    path: logs
  level:
    root: info
    org.quartz.impl.StdSchedulerFactory: error
    org.quartz.core.QuartzScheduler: error
    org.quartz.core.SchedulerSignalerImpl: error
    org.quartz.simpl.RAMJobStore: error
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7